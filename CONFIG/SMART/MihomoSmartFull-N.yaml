#####################################
# 终极优化版 THESmart 配置
# 原始配置: MihomoAio.yaml
# 配置版本: v260103
# 优化日期: 2026-01-03
# 核心优化: DNS/FakeIP + 流量嗅探 + 规则集补充
#####################################

# ==================== 锚点配置 ====================
# 代理提供者模板
BaseProvider: &BaseProvider 
  type: http
  interval: 86400
  proxy: DIRECT
  health-check: 
    enable: true
    url: 'https://www.google.com/generate_204'
    expected-status: 204
    interval: 300
    timeout: 3000
    max-failed-times: 2
    lazy: false
  override:
    udp: true
    ip-version: ipv6-prefer
  filter: '^(?!.*(群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|traffic|套餐|剩余|重置))' 

# 策略组类型模板
BaseFB: &BaseFB {type: fallback, interval: 200, lazy: true, url: 'https://www.google.com/generate_204'}
BaseCH: &BaseCH {type: load-balance, interval: 200, lazy: true, url: 'https://www.google.com/generate_204', strategy: consistent-hashing, hidden: true}
BaseCR: &BaseCR {type: load-balance, interval: 200, lazy: true, url: 'https://www.google.com/generate_204', strategy: round-robin, hidden: true}
BaseUT: &BaseUT {type: url-test, interval: 200, lazy: true, url: 'https://www.google.com/generate_204', tolerance: 20, hidden: true}
BaseSmart: &BaseSmart {type: smart, interval: 200, lazy: true, url: 'https://www.google.com/generate_204', hidden: true, uselightgbm: true, strategy: sticky-sessions, collectdata: false, sample-rate: 1}

# 节点筛选正则
FilterHK: &FilterHK '^(?=.*(?i)(港|🇭🇰|HK|Hong|HKG))(?!.*(法国|欧港专线|俄罗斯|Russia|РФ|🇷🇺|德国|Deutschland|🇩🇪|土耳其|Türkiye|Turkiye|🇹🇷|英国|United Kingdom|UK|Britain|England|🇬🇧|摩尔多瓦|Moldova|MDA|🇲🇩)).*$'
FilterSG: &FilterSG '^(?=.*(?i)(坡|🇸🇬|SG|XSP))(?!.*(排除1|排除2)).*$'
FilterJP: &FilterJP '^(?=.*(?i)(日|🇯🇵|JP|Japan|NRT|HND|KIX|CTS|FUK))(?!.*(排除1|排除2|尼日利亚|Nigeria)).*$'
FilterKR: &FilterKR '^(?=.*(?i)(韩|🇰🇷|韓|首尔|南朝鲜|KR|KOR|Korea|South))(?!.*(排除1|排除2|乌克兰|Ukraine|南非|South Africa)).*$'
FilterUS: &FilterUS '^(?=.*(?i)(美|🇺🇸|US|USA|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD))(?!.*(排除1|排除2|5x|澳大利亚|Australia|亚美尼亚|俄罗斯|Russia)).*$'
FilterTW: &FilterTW '^(?=.*(?i)(台|🇼🇸|🇹🇼|TW|tai|TPE|TSA|KHH))(?!.*(排除1|排除2)).*$'
FilterUK: &FilterUK '^(?=.*(?i)(英|英国|UK|大不列颠|伦敦|Kingdom))(?!.*(排除1|排除2|5x)).*$'
FilterEU: &FilterEU '^(?=.*(?i)(俄|奥|比|保|克罗地亚|塞|捷|丹|爱沙|芬|法|德|希|匈|爱尔|意|拉|立|卢|马其它|荷|波|葡|罗|斯洛伐|斯洛文|西|瑞|英|🇧🇪|🇨🇿|🇩🇰|🇫🇮|🇫🇷|🇩🇪|🇮🇪|🇮🇹|🇱🇹|🇱🇺|🇳🇱|🇵🇱|🇸🇪|🇬🇧|RU|CDG|FRA|AMS|MAD|BCN|FCO|MUC|BRU))(?!.*(排除1|排除2|5x)).*$'
FilterOT: &FilterOT '^(?!.*(DIRECT|直接连接|美|港|坡|台|新|日|韩|奥|比|保|克罗地亚|塞|捷|丹|爱沙|芬|法|德|希|匈|爱尔|意|拉|立|卢|马其它|荷|波|葡|罗|斯洛伐|斯洛文|西|瑞|英|🇭🇰|🇼🇸|🇹🇼|🇸🇬|🇯🇵|🇰🇷|🇺🇸|🇬🇧|🇦🇹|🇧🇪|🇨🇿|🇩🇰|🇫🇮|🇫🇷|🇩🇪|🇮🇪|🇮🇹|🇱🇹|🇱🇺|🇳🇱|🇵🇱|🇸🇪|HK|TW|SG|JP|KR|US|GB|CDG|FRA|AMS|MAD|BCN|FCO|MUC|BRU|HKG|TPE|TSA|KHH|SIN|XSP|NRT|HND|KIX|CTS|FUK|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD|LHR|LGW))'
FilterAL: &FilterAL '^(?!.*(无法|说明|使用|提示|特别|访问|支持|教程|关注|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author))'

# 策略组代理列表模板
SelectFB: &SelectFB {type: select, proxies: [故障转移, 香港策略, 狮城策略, 日本策略, 韩国策略, 美国策略, 台湾策略, 欧盟策略, 冷门自选, 全球手动, 直接连接, 自建/家宽节点]}
SelectPY: &SelectPY {type: select, proxies: [默认代理, 故障转移, 香港策略, 狮城策略, 日本策略, 韩国策略, 美国策略, 台湾策略, 欧盟策略, 冷门自选, 全球手动, 直接连接, 游戏节点, 自建/家宽节点]}
SelectDC: &SelectDC {type: select, proxies: [直接连接, 默认代理, 故障转移, 香港策略, 狮城策略, 日本策略, 韩国策略, 美国策略, 台湾策略, 欧盟策略, 冷门自选, 全球手动, 自建/家宽节点]}
SelectHK: &SelectHK {type: select, proxies: [香港策略, 默认代理, 故障转移, 狮城策略, 日本策略, 韩国策略, 美国策略, 台湾策略, 欧盟策略, 冷门自选, 全球手动, 直接连接, 自建/家宽节点]}
SelectSG: &SelectSG {type: select, proxies: [狮城策略, 默认代理, 故障转移, 香港策略, 日本策略, 韩国策略, 美国策略, 台湾策略, 欧盟策略, 冷门自选, 全球手动, 直接连接, 自建/家宽节点]}
SelectUS: &SelectUS {type: select, proxies: [美国策略, 默认代理, 故障转移, 香港策略, 狮城策略, 日本策略, 韩国策略, 台湾策略, 欧盟策略, 冷门自选, 全球手动, 直接连接, 自建/家宽节点]}

# ==================== 代理提供者 ====================
proxy-providers:
 # 优质订阅源 - 优质节点集合，使用时请修改
  优质服务商: {<<: *BaseProvider, url: '优质订阅源地址1', override: {additional-prefix: '[优] '}}
  次优服务商: {<<: *BaseProvider, url: '优质订阅源地址2', override: {additional-prefix: '[次] '}}
  # 备用订阅源 - 次优节点集合，使用时请修改
  备用服务商: {<<: *BaseProvider, url: '备用订阅源地址', override: {additional-prefix: '[备] '}}
  # 自建订阅源 - 自建节点集合，使用时请修改
  聚合服务商: {<<: *BaseProvider, url: '自建订阅源地址', override: {additional-prefix: '[自建] '}}
  # 落地订阅源 - 落地服务连接，使用时请修改
  落地服务商: {<<: *BaseProvider, url: '中转订阅源地址', override: {additional-prefix: '[中] ', dialer-proxy: 中转服务}}
  
# ==================== 监听器 ====================
listeners:
  # Shadowsocks监听器 - 远程代理入口
  - {name: SS-IN, type: shadowsocks, listen: '::', port: 10000, udp: true, password: Xf3#Lp9WqZ, cipher: aes-256-gcm}
  # Mixed监听器 - 分地区专用端口
  - {name: MIXED-SG, type: mixed, port: 50000, proxy: 狮城智能}
  - {name: MIXED-US, type: mixed, port: 50001, proxy: 美国智能}
  - {name: MIXED-TW, type: mixed, port: 50002, proxy: 台湾智能}
  - {name: MIXED-HK, type: mixed, port: 50003, proxy: 香港智能}
  - {name: MIXED-JP, type: mixed, port: 50004, proxy: 日本智能}
  - {name: MIXED-KR, type: mixed, port: 50005, proxy: 韩国智能}
  - {name: MIXED-EU, type: mixed, port: 50006, proxy: 欧洲智能}
  - {name: MIXED-AL, type: mixed, port: 50007, proxy: 一键智能}

# ==================== 核心配置 ====================
mode: rule
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
ipv6: true
allow-lan: true
unified-delay: true
tcp-concurrent: true
log-level: warning
bind-address: '*'
find-process-mode: always
global-client-fingerprint: chrome
global-ua: mihomo
keep-alive-interval: 15
keep-alive-idle: 600
etag-support: true
disable-keep-alive: false

# 认证配置
authentication:
  - mihomo:yyds666
skip-auth-prefixes:
  - 192.168.1.0/24
  - 192.168.31.0/24
  - 192.168.100.0/24
  - 127.0.0.1/8

# 实验性功能
experimental:
  quic-go-disable-gso: true

# 管理面板
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
external-ui-name: zashboard
external-ui: ui
external-controller: 127.0.0.1:9090
secret: password

# GEO数据
geodata-mode: false
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.metadb"
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"

# LightGBM模型自动更新
lgbm-auto-update: true
lgbm-update-interval: 24
lgbm-url: 'https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model-large.bin'

# 配置存储
profile:
  store-selected: true
  store-fake-ip: true
  smart-collector-size: 1024

# ==================== 流量嗅探 - 优化版 ====================
sniffer:
  enable: true
  force-dns-mapping: false
  parse-pure-ip: true
  override-destination: false
  sniff:
    # 扩充：Cloudflare非标准端口 (来自echs-top)
    HTTP:
      ports: [80, 8080-8880, 2052, 2082, 2086, 2095]
      override-destination: true
    TLS:
      ports: [443, 8443, 2053, 2083, 2087, 2096]
      override-destination: true
    QUIC:
      ports: [443, 8443, 2053, 2083, 2087, 2096]
      override-destination: true
  skip-domain:
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - "+.apple.com"
    - "+.wechat.com"
    - "+.qq.com"
    - "+.qpic.cn"
    - "+.vivox.com"
    - "+.oray.com"
    - "+.sunlogin.net"
    - "RULE-SET:proxy_domain,biliintl,telegram,meta,twitter,tiktok,spotify,pixiv,category-ai-!cn,github,steam@cn,steam,microsoft,apple,google,cloudflare,gfw"
  force-domain:
    - "+.v2ex.com"
    - "RULE-SET:netflix"
  skip-src-address:
    - "RULE-SET:private_ip,proxy_ip,telegram_ip,facebook_ip,twitter_ip,google_ip,cloudflare_ip,cn_ip"

# TUN模式
tun:
  enable: true
  stack: gvisor
  device: utun9
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
    - "any:853"
    - "tcp://any:853"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  strict-route: true
  mtu: 9000
  udp-timeout: 300

# Hosts配置
hosts:
  dns.alidns.com: [223.5.5.5, 223.6.6.6, 2400:3200::1, 2400:3200:baba::1]
  doh.pub: [1.12.12.12, 1.12.12.21, 120.53.53.53]
  dns.google: [8.8.8.8, 8.8.4.4, 2001:4860:4860::8888, 2001:4860:4860::8844]
  dns.quad9.net: [9.9.9.9, 149.112.112.112, 2620:fe::fe, 2620:fe::9]
  cloudflare-dns.com: [1.1.1.1, 1.0.0.1, 2606:4700:4700::1111, 2606:4700:4700::1001]
  services.googleapis.cn: services.googleapis.com
  cn.bing.com: www4.bing.com

# ==================== DNS配置 - 终极优化版 ====================
dns:
  enable: true
  cache-algorithm: arc
  ipv6: true
  prefer-h3: true
  use-hosts: true
  use-system-hosts: false
  respect-rules: true
  listen: 0.0.0.0:1053
  
  # FakeIP配置 - 融合优化
  enhanced-mode: fake-ip
  fake-ip-range: 100.127.0.1/16
  fake-ip-range6: fd00:bada:55ed::1/64
  fake-ip-ttl: 2
  fake-ip-filter-mode: blacklist
  
  # FakeIP过滤器 - 完整优化版
  fake-ip-filter:
    - '*'
    - '5228'
    - '5229'
    - '5230'
    # 规则集过滤 - 三份配置融合
    - 'RULE-SET:category-ads-all,AWAvenueAds,private,fake-ip_add,direct_domain,googlefcm,bilibili,cn'
    - 'RULE-SET:fakeip-filter,game_cn_domain,bank_cn_domain,wechat_domain,ai_cn_domain,NetEaseMusic_domain,fcm_domain,alibaba_domain,media_cn_domain,xiaomi_domain,steam_cn_domain,pt_cn_domain,public-tracker_domain,115_domain,aliyun_domain,apple_cn_domain,apple_firmware_domain,iptv_domain,private_domain,cn_domain'
    # 特殊域名
    - '+.pub.3gppnetwork.org'
    - '+.bing.com'
    - '+.miwifi.com'
    - '+.docker.io'
    - '+.market.xiaomi.com'
    - '+.push.apple.com'
  
  # 默认DNS服务器
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 8.8.8.8
  
  # 代理服务器DNS
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  
  # 国内DNS
  direct-nameserver:
    # - system
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    - https://223.5.5.5/dns-query#h3=true
  direct-nameserver-follow-policy: true
  
  # 国外DNS - 带ECS优化
  nameserver:
    - https://8.8.8.8/dns-query#ecs=8.8.8.8/32&ecs-override=true
    - https://9.9.9.9/dns-query#ecs=9.9.9.9/32&ecs-override=true
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  
  # DNS策略路由 - 新增
  nameserver-policy:
    # 广告域名返回空结果
    'rule-set:category-ads-all,AWAvenueAds': [rcode://name_error]
    # 国内域名使用国内DNS
    'rule-set:private,direct_domain,cn': [system, https://dns.alidns.com/dns-query, https://doh.pub/dns-query]

